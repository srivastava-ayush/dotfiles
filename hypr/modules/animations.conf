animations {
    enabled = true
    # ─── Bezier curves ───────────────────────────────────
    bezier = Out,      0.16, 1.00, 0.30, 1.00
    bezier = Snap,     0.25, 0.90, 0.35, 1.00
    bezier = Spring,   0.25, 1.30, 0.35, 1.00   
    bezier = Linear,   0.00, 0.00, 1.00, 1.00
    # ─── Window animations ───────────────────────────────
    animation = windowsIn,    1, 4,   Spring, popin 85%
    animation = windowsOut,   1, 2,   Out,    popin 90%
    animation = windowsMove,  1, 4,   Spring
    animation = layersIn,     1, 3,   Spring, slidefade
    animation = layersOut,    1, 2,   Out,  slidefade
    # ─── Border ──────────────────────────────────────────
    animation = border,       1, 5,   Linear
    # ─── Workspaces ──────────────────────────────────────
    animation = workspacesIn,  1, 5,  Spring, slide
    animation = workspacesOut, 1, 2,  Out,    slide         
    # ─── Special workspace ───────────────────────────────
    animation = specialWorkspace, 1, 4.5, Spring, slidefadevert  
}