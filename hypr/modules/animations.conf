animations {
    enabled = true

    # ─── Bezier curves ───────────────────────────────────
 
    bezier = macOut,        0.16, 1.00, 0.30, 1.00   # primary ease — smooth, weighty
    bezier = macSnap,       0.25, 0.90, 0.35, 1.00   # for overlays/layers — tighter
    bezier = macSpring,     0.22, 1.15, 0.36, 1.00   # subtle spring — responsive feel
    bezier = macLinear,     0.00, 0.00, 1.00, 1.00

    # ─── Window animations ───────────────────────────────
   
    animation = windowsIn,        1, 5,   macSpring,  popin 85%
    animation = windowsOut,       1, 2.5, macOut,     popin 90%
    animation = windowsMove,      1, 4,   macSpring

    # ─── Layers (bars, overlays) ─────────────────────────
    animation = layersIn,         1, 2.5, macSnap,    slidefadevert
    animation = layersOut,        1, 2,   macOut,     slidefadevert

    # ─── Border ──────────────────────────────────────────
    animation = border,           1, 5,   macLinear

    # ─── Workspaces ──────────────────────────────────────
 
    animation = workspaces,       1, 5,   macOut,     slide

    # ─── Special workspace ───────────────────────────────
    animation = specialWorkspace, 1, 3.5, macSpring,  slidefadevert
}