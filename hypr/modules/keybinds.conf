###################
# KEYBINDINGS
###################
$mainMod     = SUPER
$terminal    = kitty
$fileManager = thunar
$menu        = rofi
$mainMod     = SUPER


#theme swither
bind = SUPER, T, exec, .local/bin/theme

# --- App Launchers ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, A, exec, $fileManager
bind = $mainMod, E, exec, code
bind = $mainMod, W, exec, brave
bind = $mainMod, R, exec, spotify-launcher
bind = $mainMod, D, exec, pkill rofi || ~/.config/rofi/launcher.sh
bind = $mainMod, N, exec, kitty -e nmtui
bind = $mainMod, B, exec, blueman-manager

# -- App killers ----

bind = $mainMod  SHIFT, N, exec, nmcli radio wifi $( [ "$(nmcli radio wifi)" = "enabled" ] && echo off || echo on )
bind = $mainMod  SHIFT, B, exec, bash -c 'bluetoothctl show | grep -q "Powered: yes" && bluetoothctl power off || bluetoothctl power on'
# --- Window Management ---
bind = $mainMod, C, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, G, togglegroup
bind = ALT, Tab, exec, snappy-switcher next
bind = ALT SHIFT    , Tab, exec, snappy-switcher next

# --- Focus (arrow keys) ---
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Move window (Shift + arrows) ---
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# --- Resize window (Ctrl + arrows) ---
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive,  40 0
binde = $mainMod CTRL, up,    resizeactive,  0 -40
binde = $mainMod CTRL, down,  resizeactive,  0  40

# --- System ---
bind = $mainMod, L,      exec, hyprlock
bind = $mainMod, M,      exec, command -v hyprshutdown >/dev/null && hyprshutdown || hyprctl dispatch exit
bind = $mainMod SHIFT, C, exec, hyprctl reload

# --- Utilities ---
bind = $mainMod, K,      exec, hyprpicker -a
bind = $mainMod, TAB,    exec, bash ~/.local/bin/wallpaper.sh

# --- UI / Bars ---

bind = $mainMod ,X, exec, pkill waybar || waybar
bind = $mainMod, Escape, exec,  swaync-client -t -sw

# --- Clipboard ---
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# --- Screenshot ---
bind = $mainMod, Caps_Lock, exec, sh -c 'grim -g "$(slurp)" - | wl-copy'

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, one
bind = $mainMod SHIFT, S, movetoworkspace, special:one

bind = $mainMod, Z, togglespecialworkspace, two
bind = $mainMod SHIFT, Z, movetoworkspace, special:two

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

###################
# MEDIA KEYS
###################

bind = ALT, Page_Up, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = ALT, Page_Down, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindel = ALT SHIFT, Page_Up,   exec, brightnessctl set 5%+
bindel = ALT SHIFT , Page_Down, exec, brightnessctl set 5%-
bind  = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind  = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
 
# Media playback (requires playerctl)
bind = , XF86AudioPlay,  exec, playerctl play-pause
bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
