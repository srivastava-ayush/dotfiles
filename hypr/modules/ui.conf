general {
    gaps_in            = 6
    gaps_out           = 8
    border_size        = 1
    col.active_border  = $active
    col.inactive_border= $inactive
    resize_on_border   = true
    allow_tearing      = false
}
 
decoration {
    rounding           = 10
    active_opacity     = 1.0
    inactive_opacity   = 0.9

    shadow {
        enabled       = true
        range         = 20
        render_power  = 2
        color         = rgba(00000055)
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        vibrancy          = 0.2
        noise             = 0.02
        contrast          = 1.0
        brightness        = 0.9
        new_optimizations = true
    }
}

windowrule {
    name      = spotify
    workspace = special:one
    match:class = spotify
}

windowrule {
    name           = suppress-maximize
    match:class    = .*
    suppress_event = maximize
}

windowrule {
    name         = fix-xwayland-drags
    match:xwayland = true
    match:float  = true
    no_focus     = true
}

windowrule {
    name         = hyprland-run
    match:class  = hyprland-run
    float        = true
    move         = 20 monitor_h-120
}

windowrule {
    name         = float-mpv
    match:class  = ^(mpv)$
    float        = on
    opaque       = on
    size         = 640 360
    center       = on
  
}

windowrule {
    name         = calculator
    match:class  = org.gnome.Calculator
    float        = on
    opaque       = off
    size         = 340 360
    center       = on
}

windowrule {
    name         = calendar
    match:class  = org.gnome.Calendar
    float        = on
    opaque       = on
    size         = 600 480
    center       = on
}

windowrule {
    name         = gnome-camera
    match:class  = ^(org.gnome.Snapshot)$
    float        = on
    size         = 528 298
    center       = on
   
}


layerrule = match:namespace waybar, blur on
layerrule = match:namespace waybar, ignore_alpha .3
layerrule = match:namespace rofi, blur on
layerrule = match:namespace rofi, ignore_alpha .1
layerrule = match:namespace rofi, dim_around on
layerrule = match:namespace swaync-control-center, blur on
layerrule = match:namespace swaync-control-center, ignore_alpha .2
layerrule = match:namespace swaync-control-center, dim_around on
layerrule = match:namespace swaync-notification-window, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha .2
layerrule = match:namespace nwg-dock, blur on 
layerrule = match:namespace nwg-dock, ignore_alpha .3
layerrule = match:namespace nwg-dock, xray 1

misc {
    vfr                    = true
    animate_manual_resizes = true
    vrr                    = 0
    force_default_wallpaper= 0
    disable_hyprland_logo  = true
    focus_on_activate      = false
    mouse_move_enables_dpms= true
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_resizing = true
}

master {
    new_status = master
}

input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0
    accel_profile= flat

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        drag_lock            = true
        disable_while_typing = true
    }
} 

gesture = 3, horizontal, workspace
gesture = 3, up,   dispatcher, togglespecialworkspace, magic
gesture = 3, down, dispatcher, togglespecialworkspace, magic
gesture = 4, up,   dispatcher, exec, ~/.config/rofi/launchers/type-7/launcher.sh
gesture = 4, down, dispatcher, exec, pkill rofi
gesture = 4, horizontal, dispatcher, exec, bash ~/.scripts/wallpaper.sh

device {
    name        = epic-mouse-v1
    sensitivity = -0.5
    accel_profile = flat
}