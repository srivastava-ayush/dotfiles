general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    monitor =
    path = /data/wallpapers/galaxy-waves.jpg

    blur_passes = 4
    blur_size = 12

    noise = 0.04
    contrast = 1.05
    brightness = 0.85
    vibrancy = 0.2
}

label {
    text = cmd[update:1000] date "+%H:%M"
    font_size = 110
    font_family = SF Pro Display Bold
    color = rgb(255, 255, 255)

    position = 0, 100
    halign = center
    valign = center
}

label {
    text = cmd[update:60000] date "+%A, %d %B"
    font_size = 24
    font_family = SF Pro Text
    color = rgba(255, 255, 255, 0.75)

    position = 0, 0
    halign = center
    valign = center
}

label {
text =  󰌾 
    font_size = 24
    font_family = SF Pro Text
    color = rgba(255, 255, 255, 0.6)

    position = 0, 200
    halign = center
    valign = center
}

input-field {
    size = 320, 50

    position = 0, -360
    halign = center
    valign = center

    outline_thickness = 0

    inner_color = rgba(255, 255, 255, 0.08)
    font_color = rgb(255, 255, 255)

    dots_size = 0.3
    dots_spacing = 0.35

    fade_on_empty = true
    placeholder_text = Enter Password
}