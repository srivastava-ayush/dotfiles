

# ========== Core ==========
shell zsh
shell_integration disabled
allow_remote_control yes

cursor_shape block
url_shape block

window_padding_width 10
window_border_width 2

disable_ligatures yes
enable_audio_bell no
confirm_os_window_close 0
sync_to_monitor no

# ========== Opacity ==========
background_opacity 0.75

# ========== Catppuccin Frappe ==========
foreground #c6d0f5
background #303348
cursor     #c6d0f5
selection_foreground #c6d0f5
selection_background #414559

# Tabs
active_tab_foreground   #303446
active_tab_background   #c6d0f5
inactive_tab_foreground #a5adce
inactive_tab_background #414559

# Borders
active_border_color   #8caaee
inactive_border_color #51576d
bell_border_color     #e78284

# ========== ANSI Colors ==========
# black
color0  #51576d
color8  #626880

# red
color1  #e78284
color9  #e78284

# green
color2  #a6d189
color10 #a6d189

# yellow
color3  #e5c890
color11 #e5c890

# blue
color4  #303348
color12 #303348

# magenta
color5  #f4b8e4
color13 #f4b8e4

# cyan
color6  #81c8be
color14 #81c8be

# white
color7  #b5bfe2
color15 #a5adce
