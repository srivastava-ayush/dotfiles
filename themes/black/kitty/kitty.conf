# ========== Core ==========
shell zsh
shell_integration disabled
allow_remote_control yes

cursor_shape block
url_shape block

window_padding_width 10
window_border_width 2

disable_ligatures yes
enable_audio_bell no
confirm_os_window_close 0
sync_to_monitor no

# ========== Opacity ==========
background_opacity 0.75

# ========== Black Theme (Frappe-inspired) ==========
foreground #d0d4ff
background #0d0f14   # near black (not pure black, easier on eyes)
cursor     #d0d4ff
selection_foreground #d0d4ff
selection_background #1a1f2b

# Tabs
active_tab_foreground   #0d0f14
active_tab_background   #c6d0f5
inactive_tab_foreground #8c92b3
inactive_tab_background #1a1f2b

# Borders
active_border_color   #89b4fa
inactive_border_color #2a2f3a
bell_border_color     #f38ba8

# ========== ANSI Colors ==========
# black
color0  #1e222a
color8  #3a3f4b

# red
color1  #f38ba8
color9  #f38ba8

# green
color2  #a6e3a1
color10 #a6e3a1

# yellow
color3  #f9e2af
color11 #f9e2af

# blue
color4  #89b4fa
color12 #89b4fa

# magenta
color5  #f5c2e7
color13 #f5c2e7

# cyan
color6  #94e2d5
color14 #94e2d5

# white
color7  #bac2de
color15 #a6adc8